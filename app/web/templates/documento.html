<!DOCTYPE html>
<html>

</head>

<body class="container mt-4">

<a href="/" class="btn btn-secondary mb-3">⬅ Volver al dashboard</a>

<a href="/expediente/{{ doc.expediente.id }}" class="btn btn-secondary mb-3">

</html>
